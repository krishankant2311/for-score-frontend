# Next.js admin (App Router + dynamic routes) — requires Netlify Next runtime.
# Site settings → Build: base directory = FOUR-Score-main (if repo root is four_score).

[build]
  command = "npm run build"
  # Must differ from repo root (empty UI publish defaults to "/" and breaks the Next plugin).
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
